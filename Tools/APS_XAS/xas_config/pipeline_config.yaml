pipeline:
  # Input
  raw_file_pattern: "*.xdi"  ".dat"  ".csv" "hdf5", "ascii " # also support *.dat, *.csv, *.hdf5

  # Preprocessing
  preprocessing:
    energy_column: "energy"
    mu_column: "mu"
    e0_method: "max_deriv"          # or "half_edge", "fixed"
    e0_fixed: null                  # used if e0_method is "fixed"
    energy_shift: 0.0               # manual energy correction in eV
    pre_edge_range: [-150, -30]     # relative to E0
    post_edge_range: [50, 300]      # relative to E0
    normalization_order: 2          # polynomial order for post-edge
   
  # Feature Extraction
  feature_extraction:
    features:
      - edge_position
      - white_line_intensity
      - white_line_position
      - pre_edge_area
      - pre_edge_centroid
      - edge_width
      - post_edge_slope
    reference_e0: null              # if set, compute edge_shift_from_ref
  # =============================================================================
# FEATURE EXTRACTION SETTINGS
# =============================================================================
feature_extraction:
  edge:
    pre_edge_window: 20  # eV before E0 for pre-edge analysis
    edge_slope_window: 5  # eV around E0 for derivative calculation
  
  xanes:
    white_line_search_range: [0, 50]  # eV relative to E0
    white_line_threshold: 0.1  # Minimum intensity above edge to qualify as peak
    xanes_integration_range: [0, 50]  # eV relative to E0
    centroid_range: [0, 50]  # eV for centroid calculation
  
  exafs:
    require_exafs: false  # If false, EXAFS features are optional (won't fail if missing)
    k_range: [3, 12]  # Å^-1 for χ(k) analysis
    r_range: [1, 4]  # Å for FT analysis
    k_weight: 2  # k-weighting for FT
  
  derivatives:
    smoothing_window: 5  # Points for Savitzky-Golay filter
    derivative_order: 2  # Compute up to 2nd derivative
    polyorder: 3  # Polynomial order for Savitzky-Golay
    
  # LCF
  lcf:
    standards_dir: "config/standards_library"
    fit_range: [-20, 30]            # relative to E0
    force_positive: true
    sum_to_one: true
    combinatorial: true
    max_components: 3
    min_fraction: 0.01              # drop components below this

  # Quality Checks
  quality:
    min_edge_step: 0.1
    max_r_factor: 0.02
    max_chi_sq: 0.05

# Quality thresholds for analyzer
quality_thresholds:
  min_edge_jump: 0.1
  min_edge_jump_invalid: 0.05
  max_noise_level: 0.05
  saturation_threshold: 0.95
  min_data_points: 50
  min_snr: 10.0
  min_snr_invalid: 3.0
  max_pre_edge_slope: 0.01
  excellent_edge_jump: 0.5
  good_edge_jump: 0.3

# Exclusion settings for downstream analysis
exclusion:
  enabled: true
  exclude_invalid: true
  exclude_low_confidence: false
  confidence_threshold: 0.5

# Averaging settings for grouped measurements
averaging:
  enabled: false
  group_mode: replicate_suffix
  min_group_size: 2
  target_key: mu_normalized
  output_subdir: filtered_data/averaged
