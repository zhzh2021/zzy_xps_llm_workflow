# XAS Machine Learning Analysis Configuration
# All user-configurable parameters for ML modules
# Last updated: March 3, 2026

# =============================================================================
# FEATURE EXTRACTION SETTINGS
# =============================================================================
feature_extraction:
  edge:
    pre_edge_window: 20  # eV before E0 for pre-edge analysis
    edge_slope_window: 5  # eV around E0 for derivative calculation
  
  xanes:
    white_line_search_range: [0, 50]  # eV relative to E0
    white_line_threshold: 0.1  # Minimum intensity above edge to qualify as peak
    xanes_integration_range: [0, 50]  # eV relative to E0
    centroid_range: [0, 50]  # eV for centroid calculation
  
  exafs:
    require_exafs: false  # If false, EXAFS features are optional (won't fail if missing)
    k_range: [3, 12]  # Å^-1 for χ(k) analysis
    r_range: [1, 4]  # Å for FT analysis
    k_weight: 2  # k-weighting for FT
  
  derivatives:
    smoothing_window: 5  # Points for Savitzky-Golay filter
    derivative_order: 2  # Compute up to 2nd derivative
    polyorder: 3  # Polynomial order for Savitzky-Golay

# =============================================================================
# PCA (DIMENSIONALITY REDUCTION) SETTINGS
# =============================================================================
pca:
  # Component selection strategy
  auto_select_method: "kaiser+elbow+variance"  # Options: "kaiser", "elbow", "variance", "kaiser+elbow+variance"
  variance_threshold: 0.95  # Cumulative variance threshold (0-1)
  max_components: 10  # Upper limit on number of components
  min_components: 2  # Lower limit on number of components
  
  # Preprocessing
  standardize_features: true  # Always standardize features before PCA (recommended)
  center_features: true  # Center features to zero mean
  
  # Validation
  bootstrap_iterations: 100  # Number of bootstrap samples for stability check
  bootstrap_fraction: 0.8  # Fraction of data for each bootstrap sample
  stability_threshold: 0.7  # Minimum stability score (0-1)

# =============================================================================
# CLUSTERING SETTINGS
# =============================================================================
clustering:
  default_method: "kmeans"  # Options: "kmeans", "hierarchical", "dbscan", "gmm"
  use_pca_space: true  # Cluster in PCA-reduced space (recommended)
  
  # K-Means specific settings
  kmeans:
    auto_select_k: true  # Automatically determine optimal k
    k_range: [2, 10]  # Search range for optimal k
    n_init: 10  # Number of initializations with different seeds
    max_iter: 300  # Maximum iterations for convergence
    random_state: 42  # For reproducibility
  
  # Hierarchical clustering settings
  hierarchical:
    linkage: "ward"  # Options: "ward", "complete", "average", "single"
    auto_select_k: true  # Automatically cut dendrogram
    k_range: [2, 10]  # Search range for optimal k
  
  # DBSCAN settings
  dbscan:
    eps: "auto"  # Distance threshold ("auto" estimates from data)
    min_samples: 3  # Minimum samples in neighborhood
    metric: "euclidean"  # Distance metric
  
  # Gaussian Mixture Model settings
  gmm:
    covariance_type: "full"  # Options: "full", "tied", "diag", "spherical"
    auto_select_k: true
    k_range: [2, 10]
    n_init: 10
    max_iter: 100
  
  # Validation thresholds
  validation:
    min_silhouette_score: 0.3  # Minimum acceptable silhouette score
    max_edge_variation: 2.0  # Maximum E0 std dev within cluster (eV)
    min_cluster_size: 3  # Minimum number of samples per cluster
    min_spectral_similarity: 0.8  # Minimum correlation within cluster (0-1)
    flag_singleton_clusters: true  # Warn about clusters with < min_cluster_size

# =============================================================================
# TREND ANALYSIS SETTINGS
# =============================================================================
trend_analysis:
  # Correlation analysis
  correlation_method: "auto"  # Options: "pearson", "spearman", "auto" (chooses based on data)
  significance_threshold: 0.05  # p-value threshold for significance
  min_correlation: 0.3  # Minimum |r| to report as significant
  
  # Outlier detection
  outlier_detection:
    enabled: true
    method: "mahalanobis"  # Options: "mahalanobis", "isolation_forest", "local_outlier_factor"
    threshold_sigma: 3.0  # Threshold for Mahalanobis distance (number of std devs)
    contamination: 0.1  # Expected fraction of outliers (for Isolation Forest)
    n_neighbors: 20  # For Local Outlier Factor
  
  # Metadata analysis
  metadata_analysis:
    categorical_test: "anova"  # Statistical test for categorical metadata
    continuous_correlation: "auto"  # "pearson", "spearman", or "auto"

# =============================================================================
# BATCH PROCESSING SETTINGS
# =============================================================================
batch_processing:
  # Parallelization
  n_workers: 4  # Number of parallel workers (set to CPU count for max speed)
  parallel_backend: "loky"  # Options: "loky", "threading", "multiprocessing"
  
  # Checkpointing
  checkpoint_interval: 10  # Save checkpoint every N spectra
  checkpoint_dir: "checkpoints"  # Directory for checkpoint files
  resume_from_checkpoint: true  # Resume if checkpoint exists
  
  # Quality filtering
  quality_filter: "usable"  # Options: "all", "usable", "usable_strict"
  # - "all": Include all spectra
  # - "usable": Include "usable" and "usable_with_warning"
  # - "usable_strict": Only "usable" (exclude warnings)
  
  # Error handling
  continue_on_error: true  # Don't stop batch if one spectrum fails
  max_failures: 50  # Stop if this many failures occur

# =============================================================================
# OUTPUT SETTINGS
# =============================================================================
output:
  # Intermediate results
  save_intermediate: true  # Save per-spectrum preprocessing results
  intermediate_dir: "intermediate"  # Subdirectory for intermediate files
  
  # Export formats
  export_formats: ["json", "csv"]  # Options: "json", "csv", "hdf5", "pickle"
  
  # Visualization
  plot_dpi: 300  # Resolution for saved plots
  plot_format: "png"  # Options: "png", "pdf", "svg"
  generate_all_plots: true  # If false, only generate essential plots
  
  # File naming
  timestamp_outputs: true  # Add timestamp to output filenames
  compress_outputs: false  # Gzip JSON/CSV files

# =============================================================================
# LOGGING SETTINGS
# =============================================================================
logging:
  level: "INFO"  # Options: "DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"
  log_to_file: true  # Save logs to file
  log_file: "xas_ml_analysis.log"  # Log filename
  log_to_console: true  # Also print to console
  
  # Detailed logging options
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  
  # Per-module log levels (override global level)
  module_levels:
    XASFeatureExtractor: "INFO"
    XASPCAAnalyzer: "INFO"
    XASClusterer: "INFO"
    XASTrendAnalyzer: "INFO"
    XASBatchProcessor: "INFO"

# =============================================================================
# ADVANCED SETTINGS (typically don't need to change)
# =============================================================================
advanced:
  # Numerical precision
  float_precision: "float64"  # Options: "float32", "float64"
  
  # Memory management
  max_samples_in_memory: 1000  # Process in chunks if dataset larger
  chunk_size: 100  # Samples per chunk for large datasets
  
  # Random seed (for reproducibility)
  random_seed: 42
  
  # Numerical thresholds
  numerical_tolerance: 1e-6  # For numerical comparisons
  zero_threshold: 1e-10  # Values below this treated as zero

# =============================================================================
# ANALYSIS LIMITS / SAMPLE SIZE WARNINGS
# =============================================================================
analysis_limits:
  min_samples_warning: 10
  min_samples_trend: 8
  min_samples_tsne: 30
  pca_samples_per_feature: 5
  clustering_samples_per_cluster: 2

# =============================================================================
# VAE (NON-LINEAR SPECTRAL EMBEDDING) SETTINGS
# =============================================================================
vae:
  latent_dim: 2
  hidden_dim: 128
  batch_size: 16
  n_epochs: 200
  learning_rate: 0.001
  beta: 1.0
  random_seed: 42

# =============================================================================
# DEEP LEARNING (STAGE 06) SETTINGS
# =============================================================================
deep_learning:
  dataset:
    source: "features"  # "features" or "spectra"
    features_dir: null  # default: project_root/xas_results/03_feature_extraction/extracted_features
    spectra_dir: null   # default: project_root/xas_results/02_analyzed_data/normalized_data
    label_source: "metadata"  # "metadata", "feature", or "file"
    label_column: "ligand_type"
    label_file: null  # CSV with columns: sample_name,label (or sample_name,<label_col>)
    val_size: 0.1
    test_size: 0.2
    random_seed: 42
    stratify: true
    standardize: true
    scaler_type: "standard"  # "standard" or "minmax"
    target_standardize: false
    apply_pca: false
    pca_variance: 0.99
    pca_components: null
    spectra_grid:
      min_energy: 6900.0
      max_energy: 7400.0
      n_points: 400

  models:
    mlp_regression:
      hidden_layers: [512, 256, 128, 64, 32]
      l2: 0.0001
      dropout: 0.0
      learning_rate: 0.001
      batch_size: 32
      epochs: 100
      patience: 12
    mlp_classification:
      hidden_layers: [512, 256, 128, 64]
      l2: 0.0001
      dropout: 0.0
      learning_rate: 0.001
      batch_size: 32
      epochs: 100
      patience: 12
      use_class_weights: true
      use_focal_loss: false
      focal_gamma: 2.0
      focal_alpha: 0.25
    cnn_regression:
      filters: [32, 64]
      kernel_size: 5
      pool_size: 2
      dense_units: [128, 64]
      dropout: 0.0
      learning_rate: 0.001
      batch_size: 32
      epochs: 100
      patience: 12
      use_global_avg_pool: false
      dilations: [1, 1]
    cnn_classification:
      filters: [32, 64]
      kernel_size: 5
      pool_size: 2
      dense_units: [128, 64]
      dropout: 0.0
      learning_rate: 0.001
      batch_size: 32
      epochs: 100
      patience: 12
      use_class_weights: true
      use_focal_loss: false
      focal_gamma: 2.0
      focal_alpha: 0.25
      use_global_avg_pool: false
      dilations: [1, 1]
    rf_regression:
      n_estimators: 200
      max_depth: null
      min_samples_split: 2
      min_samples_leaf: 1
      max_features: "sqrt"
      random_state: 42
      grid_search: false
      grid_params:
        n_estimators: [50, 100, 200]
        max_depth: [10, 15, 20, null]
        min_samples_split: [2, 5, 10]
        min_samples_leaf: [1, 2, 4]
        max_features: ["sqrt", "log2"]
